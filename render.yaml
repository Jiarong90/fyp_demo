services:
  - type: web
    name: fyp-demo-web
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_BIN
        value: python3
      - key: MAIL_DEV_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: fyp-demo-db
          property: connectionString
      - key: LTA_ACCOUNT_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: fyp-demo-db
    databaseName: fyp_demo
    user: fyp_demo
